name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Qt runtime libraries
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0
      - name: Install
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]"
      - name: Verify
        run: make verify

  verify-with-tools:
    # External-tool job (§8.2): runs the @tool-marked tests at least somewhere.
    runs-on: ubuntu-22.04
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install external tools
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator graphviz libegl1 libgl1 libxkbcommon-x11-0
      - name: Install
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]" cocotb
      - name: Verify
        run: make verify
