name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Qt runtime libraries
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0
      - name: Install
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]"
      - name: Verify
        run: make verify

  verify-with-tools:
    # External-tool job (§8.2): runs the @tool-marked tests at least somewhere.
    runs-on: ubuntu-22.04
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install external tools
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz libegl1 libgl1 libxkbcommon-x11-0 \
            autoconf g++ flex bison help2man libfl-dev zlib1g-dev
      # cocotb 2.x needs Verilator >= 5.036; Ubuntu 22.04 apt ships 4.038.
      # Build the release verified bit-exact locally (5.048) once, then cache it.
      - name: Cache Verilator
        id: cache-verilator
        uses: actions/cache@v4
        with:
          path: ~/verilator
          key: verilator-v5.048-ubuntu-22.04
      - name: Build Verilator
        if: steps.cache-verilator.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v5.048 https://github.com/verilator/verilator /tmp/verilator
          cd /tmp/verilator
          autoconf
          ./configure --prefix "$HOME/verilator"
          make -j"$(nproc)"
          make install
      - name: Add Verilator to PATH
        run: echo "$HOME/verilator/bin" >> "$GITHUB_PATH"
      - name: Install
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]" cocotb
      - name: Verify
        run: make verify
