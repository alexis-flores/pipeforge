# Tag-triggered release: build sdist+wheel, publish to PyPI, attach to a
# GitHub release. Publishing uses PyPI *trusted publishing* — configure the
# publisher once at https://pypi.org/manage/account/publishing/ with:
#   owner: alexis-flores   repository: pipeforge
#   workflow: release.yml  environment: pypi
# Then: git tag v0.2.0 && git push origin v0.2.0
name: release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install build && python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-22.04
    environment: pypi
    permissions:
      id-token: write  # PyPI trusted publishing
      contents: write  # GitHub release
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
